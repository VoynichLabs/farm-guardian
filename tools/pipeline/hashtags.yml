    - farmlife
  mid_tier:
    - homesteading
    - countrylife
  long_tail: []
  # OPSEC: do NOT use town-level tags (#hamptonct, etc.). State-level
  # (#newengland) is OK IF the content is clearly regional, but not
  # default.

orchard:
  top_tier:
    - gardening
    - garden
  mid_tier:
    - homegarden
  long_tail:
    - orchard

# FORBIDDEN — runtime safety net, enforced at load time.
# Any of these appearing in a bucket above is a loader error.
# Any of these appearing in a caption from --override-tags is a CLI warning.
forbidden:
  - markbarney
  - markbarneyai
  - builtbymarkbarney
  - builtwithai
  - aiassistedfarm
  - aiconsultant
  - aiarchitect
  - aiengineer  # was in the second-draft tech bucket — no farm audience
  - edgeai
  - computervision  # real tag but wrong audience for this account
  - yolov8  # tiny community, ML-only audience
  - openclaw  # creator-branded
  - macminimac  # invented
  - homeautomation  # wrong audience (smart-home, not farm)
