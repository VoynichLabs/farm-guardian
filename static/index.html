<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FARM GUARDIAN</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-0: #08090d;
            --bg-1: #0e1117;
            --bg-2: #161b22;
            --bg-3: #1c2129;
            --border: #21262d;
            --border-bright: #30363d;
            --text-0: #e6edf3;
            --text-1: #8b949e;
            --text-2: #484f58;
            --green: #3fb950;
            --red: #f85149;
            --amber: #d29922;
            --blue: #58a6ff;
            --mono: 'SF Mono', 'Cascadia Code', Consolas, 'Liberation Mono', monospace;
        }
        html, body { height: 100%; overflow: hidden; background: var(--bg-0); color: var(--text-0); font-family: var(--mono); font-size: 11px; }

        /* Layout */
        .root { display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 38px; background: var(--bg-1); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; padding: 4px 3px; gap: 1px; }
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

        /* Sidebar */
        .nav-btn { display: flex; align-items: center; justify-content: center; width: 32px; height: 28px; border-radius: 3px; cursor: pointer; background: none; border: none; color: var(--text-2); transition: all 0.1s; }
        .nav-btn:hover { background: var(--bg-3); color: var(--text-1); }
        .nav-btn.active { background: var(--bg-3); color: var(--text-0); }
        .nav-icon { width: 15px; height: 15px; flex-shrink: 0; }

        /* Status bar */
        .status-bar { height: 22px; background: var(--bg-1); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 8px; gap: 8px; font-size: 10px; color: var(--text-2); flex-shrink: 0; white-space: nowrap; overflow: hidden; }
        .status-bar .sep { color: var(--border-bright); margin: 0 2px; }
        .status-bar .val { color: var(--text-1); }
        .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .dot-green { background: var(--green); }
        .dot-red { background: var(--red); }
        .dot-amber { background: var(--amber); }
        .dot-off { background: var(--text-2); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* Pages */
        .page { position: absolute; inset: 0; display: none; flex-direction: column; padding: 3px; gap: 3px; overflow: hidden; }
        .page.active { display: flex; }
        .page-scroll { overflow-y: auto; }

        /* Camera feeds */
        .cam-grid { display: grid; gap: 2px; flex: 1; min-height: 0; }
        .cam-cell { background: var(--bg-0); border: 1px solid var(--border); position: relative; overflow: hidden; min-height: 0; }
        .cam-cell img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .cam-cell .cam-label { position: absolute; top: 0; left: 0; background: rgba(0,0,0,0.75); padding: 1px 6px; font-size: 10px; display: flex; align-items: center; gap: 4px; color: var(--text-1); }
        .cam-cell .cam-offline { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-2); font-size: 10px; }
        /* v2.37.5 stale-frame treatment for the LOCAL dashboard only. */
        /* Farm-2026 (public site) does not render these styles — it keeps */
        /* showing the last frame undimmed as designed. */
        .cam-cell.cam-stale .cam-stale-img { filter: grayscale(1) brightness(0.55); width:100%; height:100%; object-fit: contain; display:block; }
        .cam-cell .cam-stale-banner { position: absolute; top: 0; left: 0; right: 0; background: rgba(180, 40, 40, 0.9); color: #fff; font-size: 11px; font-weight: 600; padding: 3px 8px; text-align: center; letter-spacing: 0.5px; z-index: 2; }

        /* System strip */
        .sys-strip { display: flex; gap: 12px; padding: 2px 6px; background: var(--bg-1); border: 1px solid var(--border); font-size: 10px; color: var(--text-2); align-items: center; flex-shrink: 0; }
        .sys-strip .lbl { color: var(--text-2); }
        .sys-strip .val { color: var(--text-1); }

        /* Tables */
        .tbl { width: 100%; border-collapse: collapse; }
        .tbl th { text-align: left; padding: 2px 6px; font-size: 10px; color: var(--text-2); font-weight: 500; background: var(--bg-1); border-bottom: 1px solid var(--border); }
        .tbl td { padding: 2px 6px; font-size: 10px; color: var(--text-1); border-bottom: 1px solid var(--bg-2); }
        .tbl tr:hover td { background: var(--bg-2); }

        /* Detection panel */
        .det-panel { background: var(--bg-1); border: 1px solid var(--border); overflow: hidden; flex-shrink: 0; }

        /* Badges */
        .badge { display: inline-block; padding: 0 4px; font-size: 9px; border-radius: 2px; line-height: 16px; }
        .badge-red { background: rgba(248,81,73,0.15); color: var(--red); }
        .badge-mute { background: rgba(139,148,158,0.1); color: var(--text-2); }

        /* Cards */
        .card { background: var(--bg-2); border: 1px solid var(--border); padding: 8px; }
        .card-title { font-size: 10px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }

        /* Buttons */
        .btn { padding: 3px 8px; border-radius: 2px; font-size: 10px; font-family: var(--mono); cursor: pointer; border: 1px solid var(--border-bright); background: var(--bg-3); color: var(--text-1); transition: background 0.1s; }
        .btn:hover { background: var(--border-bright); color: var(--text-0); }
        .btn-blue { background: rgba(88,166,255,0.15); border-color: rgba(88,166,255,0.3); color: var(--blue); }
        .btn-blue:hover { background: rgba(88,166,255,0.25); }
        .btn-red { background: rgba(248,81,73,0.15); border-color: rgba(248,81,73,0.3); color: var(--red); }
        .btn-red:hover { background: rgba(248,81,73,0.25); }
        .btn-amber { background: rgba(210,153,34,0.15); border-color: rgba(210,153,34,0.3); color: var(--amber); }
        .btn-amber:hover { background: rgba(210,153,34,0.25); }
        .btn-green { background: rgba(63,185,80,0.15); border-color: rgba(63,185,80,0.3); color: var(--green); }
        .btn-green:hover { background: rgba(63,185,80,0.25); }

        /* PTZ */
        .ptz-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; width: 108px; }
        .ptz-grid .btn { height: 28px; display: flex; align-items: center; justify-content: center; font-size: 11px; }

        /* Inputs */
        input[type="number"], input[type="text"], select, textarea {
            background: var(--bg-0); border: 1px solid var(--border); color: var(--text-0);
            border-radius: 2px; padding: 2px 6px; width: 100%; font-size: 10px; font-family: var(--mono);
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--blue); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-0); }
        ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="root">

        <!-- Sidebar -->
        <nav class="sidebar">
            <div style="margin-bottom: 4px; display: flex; justify-content: center;">
                <div style="width: 26px; height: 26px; background: var(--green); border-radius: 3px; display: flex; align-items: center; justify-content: center; opacity: 0.9;">
                    <i data-lucide="shield" class="nav-icon" style="color: #000; width: 14px; height: 14px;"></i>
                </div>
            </div>
            <button onclick="navigate('dashboard')" data-nav="dashboard" title="Dashboard" class="nav-btn active"><i data-lucide="layout-dashboard" class="nav-icon"></i></button>
            <button onclick="navigate('cameras')" data-nav="cameras" title="Cameras" class="nav-btn"><i data-lucide="camera" class="nav-icon"></i></button>
            <button onclick="navigate('events')" data-nav="events" title="Events" class="nav-btn"><i data-lucide="list" class="nav-icon"></i></button>
            <button onclick="navigate('alerts')" data-nav="alerts" title="Alerts" class="nav-btn"><i data-lucide="bell" class="nav-icon"></i></button>
            <button onclick="navigate('ptz')" data-nav="ptz" title="PTZ" class="nav-btn"><i data-lucide="move" class="nav-icon"></i></button>
            <button onclick="navigate('reports')" data-nav="reports" title="Reports" class="nav-btn"><i data-lucide="file-text" class="nav-icon"></i></button>
            <button onclick="navigate('settings')" data-nav="settings" title="Settings" class="nav-btn"><i data-lucide="settings" class="nav-icon"></i></button>
            <div style="margin-top: auto; display: flex; justify-content: center;">
                <span id="sidebar-dot" class="status-dot dot-off"></span>
            </div>
        </nav>

        <div class="main">

            <!-- Status bar -->
            <div class="status-bar">
                <span id="sb-dot" class="status-dot dot-off"></span>
                <span id="sb-status" class="val">--</span>
                <span class="sep">|</span>
                <span id="sb-uptime" class="val">--</span>
                <span class="sep">|</span>
                <span>FRM</span> <span id="sb-frames" class="val">--</span>
                <span class="sep">|</span>
                <span>DET</span> <span id="sb-detections" class="val" style="color: var(--blue);">--</span>
                <span class="sep">|</span>
                <span>LAST</span> <span id="sb-last-detection" class="val">--</span>
                <div style="margin-left: auto; display: flex; gap: 6px; align-items: center;">
                    <span id="page-title" style="color: var(--text-2); font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em;">DASHBOARD</span>
                    <button onclick="refreshCurrentPage()" class="btn" style="padding: 1px 4px; border: none; background: none; color: var(--text-2);">
                        <i data-lucide="refresh-cw" style="width: 10px; height: 10px;"></i>
                    </button>
                </div>
            </div>

            <!-- Pages -->
            <div style="flex: 1; min-height: 0; position: relative;">

                <!-- Dashboard -->
                <section id="page-dashboard" class="page active">
                    <div id="cam-grid" class="cam-grid"></div>
                    <div class="sys-strip">
                        <div><span class="lbl">PATROL</span> <span id="dash-patrol-status" class="val">--</span></div>
                        <div><span class="lbl">DETERRENT</span> <span id="dash-deterrent-status" class="val">--</span></div>
                        <div><span class="lbl">TRACKS</span> <span id="dash-tracks-count" class="val">0</span></div>
                        <div style="margin-left: auto; display: flex; align-items: center; gap: 6px;">
                            <span class="lbl">VLM</span>
                            <span id="dash-pipeline-status" class="val">--</span>
                            <button id="pipeline-toggle-btn" onclick="togglePipeline()" class="btn btn-amber" style="padding: 1px 6px; font-size: 9px;">--</button>
                        </div>
                    </div>
                    <div class="det-panel" id="det-panel">
                        <table class="tbl">
                            <thead><tr>
                                <th>TIME</th><th>CAM</th><th>CLASS</th><th>CONF</th><th>THREAT</th>
                            </tr></thead>
                            <tbody id="dashboard-detections">
                                <tr><td colspan="5" style="text-align: center; color: var(--text-2);">--</td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- Cameras -->
                <section id="page-cameras" class="page page-scroll" style="padding: 6px; gap: 6px;">
                    <div style="display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;">
                        <span class="card-title" style="margin: 0;">CAMERAS</span>
                        <button onclick="rescanCameras()" class="btn btn-blue"><i data-lucide="scan" style="width: 10px; height: 10px; margin-right: 4px;"></i>RESCAN</button>
                    </div>
                    <div id="cameras-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 4px;"></div>
                </section>

                <!-- Events -->
                <section id="page-events" class="page page-scroll" style="padding: 6px; gap: 6px;">
                    <div style="display: flex; align-items: center; gap: 6px; flex-shrink: 0;">
                        <span class="card-title" style="margin: 0;">EVENTS</span>
                        <select id="event-date-select" onchange="loadEventsForDate(this.value)"><option value="">date...</option></select>
                        <select id="event-class-filter" onchange="filterEvents()">
                            <option value="">all</option>
                            <option value="bird">bird</option><option value="cat">cat</option>
                            <option value="dog">dog</option><option value="bear">bear</option>
                            <option value="person">person</option>
                        </select>
                    </div>
                    <div style="border: 1px solid var(--border); overflow: hidden;">
                        <table class="tbl">
                            <thead><tr><th>TIME</th><th>CAM</th><th>CLASS</th><th>CONF</th><th>SNAP</th></tr></thead>
                            <tbody id="events-table"><tr><td colspan="5" style="text-align:center;">--</td></tr></tbody>
                        </table>
                    </div>
                    <div id="snapshot-modal" onclick="closeSnapshot()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:50; align-items:center; justify-content:center;">
                        <img id="snapshot-modal-img" src="" style="max-width:90vw; max-height:90vh;">
                    </div>
                </section>

                <!-- Alerts -->
                <section id="page-alerts" class="page page-scroll" style="padding: 6px; gap: 6px;">
                    <div style="display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;">
                        <span class="card-title" style="margin: 0;">ALERTS</span>
                        <button onclick="sendTestAlert()" id="test-alert-btn" class="btn btn-amber">TEST ALERT</button>
                    </div>
                    <div id="test-alert-result" style="display:none; font-size:10px; padding:3px 6px;"></div>
                    <div style="border: 1px solid var(--border); overflow: hidden;">
                        <table class="tbl">
                            <thead><tr><th>TIME</th><th>CAM</th><th>CLASSES</th><th>STATUS</th></tr></thead>
                            <tbody id="alerts-table"><tr><td colspan="4" style="text-align:center;">--</td></tr></tbody>
                        </table>
                    </div>
                </section>

                <!-- PTZ -->
                <section id="page-ptz" class="page page-scroll" style="padding: 6px; gap: 6px;">
                    <span class="card-title">PTZ CONTROL</span>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
                        <div class="card">
                            <div class="card-title">MANUAL</div>
                            <select id="ptz-camera-select" style="margin-bottom: 6px;"></select>
                            <div style="display: flex; justify-content: center; margin-bottom: 6px;">
                                <div class="ptz-grid">
                                    <div></div><button class="btn" onclick="ptzMove('up')">&#9650;</button><div></div>
                                    <button class="btn" onclick="ptzMove('left')">&#9668;</button>
                                    <button class="btn btn-red" onclick="ptzStop()" style="font-weight:700;">&#9632;</button>
                                    <button class="btn" onclick="ptzMove('right')">&#9658;</button>
                                    <div></div><button class="btn" onclick="ptzMove('down')">&#9660;</button><div></div>
                                </div>
                            </div>
                            <div style="display: flex; gap: 3px; justify-content: center; margin-bottom: 8px;">
                                <button class="btn" onclick="ptzZoom('in')">ZOOM +</button>
                                <button class="btn" onclick="ptzZoom('out')">ZOOM -</button>
                            </div>
                            <div style="border-top: 1px solid var(--border); padding-top: 6px; display: flex; gap: 3px; flex-wrap: wrap;">
                                <button class="btn btn-amber" onclick="toggleSpotlight(true)">SPOT ON</button>
                                <button class="btn" onclick="toggleSpotlight(false)">SPOT OFF</button>
                                <button class="btn btn-red" onclick="triggerSiren()">SIREN</button>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-title">PATROL</div>
                            <div id="ptz-patrol-status" style="color: var(--text-2); margin-bottom: 6px;">--</div>
                            <div id="ptz-presets" style="display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px;"></div>
                            <div style="border-top: 1px solid var(--border); padding-top: 6px;">
                                <div class="card-title">DETERRENT</div>
                                <div id="deterrent-status" style="color: var(--text-2);">--</div>
                            </div>
                            <div style="border-top: 1px solid var(--border); padding-top: 6px; margin-top: 6px;">
                                <div class="card-title">ACTIVE TRACKS</div>
                                <div id="active-tracks" style="color: var(--text-2);">--</div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Reports -->
                <section id="page-reports" class="page page-scroll" style="padding: 6px; gap: 6px;">
                    <div style="display: flex; align-items: center; gap: 6px; flex-shrink: 0;">
                        <span class="card-title" style="margin: 0;">REPORTS</span>
                        <select id="report-date-select" onchange="loadReport(this.value)"><option value="">date...</option></select>
                        <button onclick="generateReport()" class="btn btn-blue">GENERATE</button>
                    </div>
                    <div id="report-content"><div class="card" style="text-align: center; color: var(--text-2);">--</div></div>
                </section>

                <!-- Settings -->
                <section id="page-settings" class="page page-scroll" style="padding: 6px; gap: 6px; overflow-y: auto;">
                    <span class="card-title">CONFIGURATION</span>
                    <div class="card">
                        <div class="card-title" style="color: var(--blue);">DETECTION</div>
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;">
                            <div><label style="display:block; font-size:9px; color:var(--text-2); margin-bottom:1px;">CONFIDENCE</label><input type="number" id="cfg-confidence" min="0" max="1" step="0.05" value="0.45"></div>
                            <div><label style="display:block; font-size:9px; color:var(--text-2); margin-bottom:1px;">BIRD MIN BBOX %</label><input type="number" id="cfg-bird-min" min="0" max="50" step="0.5" value="8"></div>
                            <div><label style="display:block; font-size:9px; color:var(--text-2); margin-bottom:1px;">MIN DWELL FRAMES</label><input type="number" id="cfg-dwell" min="1" max="30" step="1" value="3"></div>
                            <div><label style="display:block; font-size:9px; color:var(--text-2); margin-bottom:1px;">FRAME INTERVAL (S)</label><input type="number" id="cfg-interval" min="0.1" max="10" step="0.1" value="1.0"></div>
                            <div><label style="display:block; font-size:9px; color:var(--text-2); margin-bottom:1px;">PREDATOR CLASSES</label><input type="text" id="cfg-predators" value="bird,cat,dog,bear"></div>
                            <div><label style="display:block; font-size:9px; color:var(--text-2); margin-bottom:1px;">IGNORE CLASSES</label><input type="text" id="cfg-ignore" value="person,car,truck,bicycle"></div>
                        </div>
                        <div style="margin-top: 6px;">
                            <label style="display:block; font-size:9px; color:var(--text-2); margin-bottom:2px;">PER-CLASS THRESHOLDS</label>
                            <div id="class-thresholds" style="display:grid; grid-template-columns:repeat(4,1fr); gap:4px;"></div>
                        </div>
                        <div style="margin-top: 6px;">
                            <label style="display:block; font-size:9px; color:var(--text-2); margin-bottom:1px;">NO-ALERT ZONE (JSON)</label>
                            <textarea id="cfg-zone" rows="2" style="font-size:10px;" placeholder='[[10,60],[30,60],[30,90],[10,90]]'></textarea>
                        </div>
                        <div style="display:flex; align-items:center; gap:6px; margin-top:6px;">
                            <button onclick="saveDetectionConfig()" class="btn btn-blue">SAVE</button>
                            <span id="detection-save-result" style="display:none; font-size:10px;"></span>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-title" style="color: var(--amber);">ALERTS</div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
                            <div><label style="display:block; font-size:9px; color:var(--text-2); margin-bottom:1px;">DISCORD WEBHOOK</label><input type="text" id="cfg-webhook" placeholder="https://discord.com/api/webhooks/..."></div>
                            <div><label style="display:block; font-size:9px; color:var(--text-2); margin-bottom:1px;">COOLDOWN (S)</label><input type="number" id="cfg-cooldown" min="0" max="3600" step="30" value="300"></div>
                            <div style="display:flex; align-items:center; gap:4px;">
                                <input type="checkbox" id="cfg-snapshot"><label for="cfg-snapshot" style="font-size:10px; color:var(--text-1);">include snapshot</label>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center; gap:6px; margin-top:6px;">
                            <button onclick="saveAlertConfig()" class="btn btn-amber">SAVE</button>
                            <span id="alert-save-result" style="display:none; font-size:10px;"></span>
                        </div>
                    </div>
                </section>

            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
